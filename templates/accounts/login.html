{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-[70vh]">

<div class="bg-white p-10 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-6">
Login to Your Account
</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username_or_email"
placeholder="Username or Email"
class="w-full border px-4 py-2 mb-4 rounded">

<input type="password" name="password"
placeholder="Password"
class="w-full border px-4 py-2 mb-6 rounded">

<button class="w-full bg-blue-600 text-white py-2 rounded">
Login
</button>

</form>

<p class="text-center mt-4">
Don't have an account?
<a href="{% url 'register' %}" class="text-blue-600">Register</a>
</p>

</div>

</div>

{% endblock %}
