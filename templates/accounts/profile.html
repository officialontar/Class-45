{% extends 'base.html' %}

{% block title %}
    Profile - {{ request.user.get_full_name}}
{% endblock %}

{% block content %}
    <div class="bg-gray-100 flex items-center justify-center min-h-screen">
        <div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-md">
        
            <h2 class="text-3xl font-bold text-center mb-8">
                Your Profile
            </h2>

            <p class="text-gray-700 text-center">
                Welcome to your profile page! Here you can view and edit your personal information, change your password, and manage your account settings.
            </p>

        </div>
    </div>
{% endblock %}
