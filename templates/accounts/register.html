{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-[70vh]">

<div class="bg-white p-10 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-6">
Create Account
</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="text" name="first_name"
placeholder="First Name *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<input type="text" name="last_name"
placeholder="Last Name *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<input type="text" name="username"
placeholder="Username *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<input type="email" name="email"
placeholder="Email *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<input type="text" name="phone"
placeholder="Phone Number *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<input type="password" name="password"
placeholder="Password *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<input type="password" name="confirm_password"
placeholder="Confirm Password *"
required
class="w-full border px-4 py-2 mb-4 rounded">

<label class="text-sm text-gray-600">Upload Image / PDF *</label>

<input type="file"
name="profile_image"
required
accept=".jpg,.jpeg,.png,.pdf"
class="w-full border px-4 py-2 mb-6 rounded">

<button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
Register
</button>

</form>

<p class="text-center mt-4">

Already have an account?

<a href="{% url 'login' %}" class="text-blue-600 font-semibold">
Login
</a>

</p>

</div>

</div>

{% endblock %}
