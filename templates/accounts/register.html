{% extends 'base.html' %}

{% block title %}
    Register New Account
{% endblock %}



{% block content %}
    <div class="bg-gray-100 flex items-center justify-center min-h-screen">
        <div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-2xl">
        
        <h2 class="text-3xl font-bold text-center mb-8">
            Create Account
        </h2>

        <form class="space-y-6">

            <!-- First & Last Name -->
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block mb-2 font-medium">First Name</label>
                    <input type="text" placeholder="Enter first name"
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block mb-2 font-medium">Last Name</label>
                    <input type="text" placeholder="Enter last name"
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <!-- Username -->
            <div>
                <label class="block mb-2 font-medium">Username</label>
                <input type="text" placeholder="Enter username"
                    class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-2 font-medium">Email</label>
                <input type="email" placeholder="Enter email"
                    class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Phone -->
            <div>
                <label class="block mb-2 font-medium">Phone Number</label>
                <input type="tel" placeholder="Enter phone number"
                    class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Password & Confirm -->
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block mb-2 font-medium">Password</label>
                    <input type="password" placeholder="Enter password"
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block mb-2 font-medium">Confirm Password</label>
                    <input type="password" placeholder="Confirm password"
                        class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <!-- Submit Button -->
            <div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Register
                </button>
            </div>

        </form>

        <!-- Login Link -->
        <p class="text-center mt-6 text-gray-600">
            Already have an account?
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Login</a>
        </p>

    </div>
    </div>
{% endblock %}
